<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nueva misión</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f7fb;
        }

        header {
            background: #111827;
            color: white;
            padding: 20px;
        }

        nav a {
            color: white;
            margin-right: 15px;
            text-decoration: none;
            font-weight: bold;
        }

        main {
            padding: 30px;
        }

        .form-card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            max-width: 500px;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            box-sizing: border-box;
        }

        button {
            margin-top: 20px;
            padding: 10px 14px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>
<body>
<header>
    <h1>Academia Espacial Spring</h1>
    <nav>
        <a th:href="@{/}">Inicio</a>
        <a th:href="@{/pilotos}">Pilotos</a>
        <a th:href="@{/naves}">Naves</a>
        <a th:href="@{/misiones}">Misiones</a>
    </nav>
</header>

<main>
    <h2>Nueva misión</h2>

    <div class="form-card">
        <form th:action="@{/misiones/guardar-mision}" th:object="${mision}" method="post">



            <label for="codigo">Código</label>
            <input type="text" id="codigo" th:field="*{codigo}" />

            <label for="destino">Destino</label>
            <input type="text" id="destino" th:field="*{destino}" />

            <label for="estado">Estado</label>
            <select id="estado" th:field="*{estadoMision}">
                <option th:each="estado : ${EstadoMision}"
                        th:value="${estado}"
                        th:text="${estado}">
                </option>
            </select>

            <label for="nave">Nave asignada</label>
            <select id="nave" th:field="*{naveId}">
                <option th:each="n : ${naves}"
                        th:value="${n.id}"
                        th:text="${n.nombre}">
                </option>
            </select>


            <button type="submit">Guardar misión</button>
        </form>
    </div>
</main>
