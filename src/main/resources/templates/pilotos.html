<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Listado de Pilotos</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f7fb;
        }

        header {
            background: #111827;
            color: white;
            padding: 20px;
        }

        nav a {
            color: white;
            margin-right: 15px;
            text-decoration: none;
            font-weight: bold;
        }

        main {
            padding: 30px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }

        th {
            background: #e5e7eb;
        }

        .button {
            display: inline-block;
            margin-bottom: 20px;
            padding: 10px 14px;
            background: #2563eb;
            color: white;
            text-decoration: none;
            border-radius: 6px;
        }
    </style>

</head>
<body>
<header>
    <h1>Academia Espacial Spring</h1>
    <nav>
        <a th:href="@{/}">Inicio</a>
        <a th:href="@{/pilotos}">Pilotos</a>
        <a th:href="@{/naves}">Naves</a>
        <a th:href="@{/misiones}">Misiones</a>
    </nav>
</header>

<main>
    <h2>Listado de pilotos</h2>

    <a class="button" th:href="@{/pilotos/nuevo-piloto}">Nuevo piloto</a>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Rango</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody>

        <tr th:each="piloto : ${pilotos}">
            <td th:text="${piloto.id}"></td>
            <td th:text="${piloto.nombre}"></td>
            <td th:text="${piloto.rango}"></td>

            <td>
                <form th:action="@{/pilotos/eliminar/{id}(id=${piloto.id})}" method="post">
                    <button type="submit" class="delete-button">Borrar</button>
                </form>
            </td>
        </tr>

        </tbody>
    </table>
</main>

</body>
</html>
